<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fishhook 환경설정</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options-shell" aria-labelledby="page-title">
      <section class="hero">
        <div class="brand-lockup">
          <img class="brand-logo" src="../icons/icon512.png" alt="" />
          <div>
            <p class="eyebrow" data-i18n="options.eyebrow">fishhook settings</p>
            <h1 id="page-title" data-i18n="options.title">환경설정</h1>
          </div>
        </div>
      </section>

      <form id="settings-form" class="settings-form" novalidate>
        <p class="form-copy" data-i18n="options.description">
          Fisheye에서 Jira 내용을 보여주기 위한 기본 경로를 설정합니다.
        </p>

        <div class="field-grid">
          <label class="field" for="jira-url">
            <span class="field-label" data-i18n="options.jiraUrl.label">Jira 경로</span>
            <input
              id="jira-url"
              name="jiraUrl"
              type="url"
              inputmode="url"
              autocomplete="url"
              placeholder="https://jira.<domain>.com"
              data-i18n-placeholder="options.jiraUrl.placeholder"
              aria-describedby="jira-url-error"
            />
            <span id="jira-url-error" class="field-error" aria-live="polite"></span>
          </label>

          <label class="field" for="fisheye-url">
            <span class="field-label" data-i18n="options.fisheyeUrl.label">Fisheye 경로</span>
            <input
              id="fisheye-url"
              name="fisheyeUrl"
              type="url"
              inputmode="url"
              autocomplete="url"
              placeholder="https://fisheye.<domain>.com"
              data-i18n-placeholder="options.fisheyeUrl.placeholder"
              aria-describedby="fisheye-url-error"
            />
            <span id="fisheye-url-error" class="field-error" aria-live="polite"></span>
          </label>
        </div>

        <div class="actions">
          <button id="save-button" class="primary-button" type="submit" data-i18n="options.save">
            저장
          </button>
        </div>
      </form>

      <section class="settings-card language-card" aria-labelledby="language-title">
        <div class="card-heading">
          <h2 id="language-title" data-i18n="options.language.label">언어</h2>
        </div>

        <label class="field language-field" for="language">
          <span class="field-label" data-i18n="options.language.label">언어</span>
          <select id="language" name="language">
            <option value="auto" data-i18n="options.language.auto">브라우저 기본값</option>
            <option value="en" data-i18n="options.language.en">영어</option>
            <option value="ko" data-i18n="options.language.ko">한국어</option>
          </select>
        </label>
      </section>
    </main>

    <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>

    <script src="../src/i18n/i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
