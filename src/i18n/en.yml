extension:
  name: FishHook
  description: Show Jira content inside Fisheye.

popup:
  activatePage: Apply to current page
  openOptions: Open settings
  activated: FishHook is active on this page.
  activateFailed: Could not apply FishHook to this page.
  fisheyeUrlRequired: Set the Fisheye URL first.
  jiraUrlRequired: Set the Jira URL first.
  notFisheyePage: Open the configured Fisheye page first.
  permissionRequired: Site permission is required.
  unsupportedPage: This page is not supported.

options:
  title: Settings
  eyebrow: fishhook settings
  description: Set the base paths used to show Jira content inside Fisheye.
  language:
    label: Language
    auto: Browser default
    en: English
    ko: Korean
  jiraUrl:
    label: Jira URL
    placeholder: https://jira.<domain>.com
    invalid: Enter a valid Jira URL.
  fisheyeUrl:
    label: Fisheye URL
    placeholder: https://fisheye.<domain>.com
    invalid: Enter a valid Fisheye URL.
  save: Save
  saving: Saving

toast:
  saved: Saved.
  languageChanged: Language changed.
  invalidJiraUrl: Check the Jira URL.
  invalidFisheyeUrl: Check the Fisheye URL.
  loadFailed: Could not load settings.
  saveFailed: Could not save settings.
  close: Close

objectives:
  loadAriaLabel: Load Jira content
  loadTitle: Show Jira content in Objectives
  fallbackText: Load content
  loading: Loading Jira content.
  restore: Restore original content
  previewBanner: Jira content preview
  openJira: Open Jira
  jiraUrlRequired: The Jira URL is not set. Add the Jira URL in settings first.
  loginRequired: You are not logged in to Jira. Log in to Jira first, then try again.
  issueKeyNotFound: Could not find a Jira issue key on this Fisheye page.
  targetNotFound: Could not find the Objectives area.
  loadFailed: Could not load Jira content.
